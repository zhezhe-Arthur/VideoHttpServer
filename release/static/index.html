<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Video Folder Server</title>
    <style>
        * {
            box-sizing: border-box;
        }

        li {
            margin-bottom: 20px;
        }
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .header {
            margin-bottom: 24px;
        }

        .title {
            margin: 0 0 8px;
            font-size: 32px;
            font-weight: 700;
        }

        .subtitle {
            margin: 0;
            color: #666;
            font-size: 15px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .video-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .video-item + .video-item {
            margin-top: 12px;
        }

        .video-link {
            display: block;
            padding: 14px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #222;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
            word-break: break-word;
            margin-top: 12px;
        }

        .video-link:hover {
            background: #eef4ff;
            border-color: #bcd0ff;
            transform: translateY(-1px);
        }

        .video-name {
            font-size: 115px;
            line-height: 1.5;
        }

        .empty {
            padding: 24px;
            text-align: center;
            color: #777;
            background: #fafafa;
            border-radius: 12px;
            border: 1px dashed #d7dce5;
        }

        .loading {
            color: #666;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 14px 32px;
            }

            .title {
                font-size: 24px;
            }

            .card {
                padding: 14px;
                border-radius: 14px;
            }

            .video-link {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="title">Video List</h1>
        <p class="subtitle">局域网视频列表</p>
    </div>

    <div class="card">
        <div id="app" class="loading">正在加载视频列表...</div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
